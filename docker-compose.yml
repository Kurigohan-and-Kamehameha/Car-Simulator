version: '3.8'

services:
  backend:
    build:
      context: ./backend
    image: ghcr.io/kurigohan-and-kamehameha/car-simulator-backend:latest
    ports:
      - "8080:8080"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: ghcr.io/kurigohan-and-kamehameha/car-simulator-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
